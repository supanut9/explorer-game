name: unity-validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "sprint/**"

permissions:
  contents: read
  checks: write

jobs:
  unity-project-sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Unity project baseline
        run: python3 scripts/validate_unity_project.py

  unity-validation-readiness:
    runs-on: ubuntu-latest
    needs: unity-project-sanity

    steps:
      - name: Report validation mode
        run: |
          if [ -n "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "Unity license secret detected. EditMode validation job will run."
          else
            echo "UNITY_LICENSE is not configured. unity-project-sanity ran, but unity-editmode-tests will stay skipped until license secrets are added."
          fi

  unity-editmode-tests:
    name: unity-editmode-tests
    runs-on: ubuntu-latest
    needs:
      - unity-project-sanity
      - unity-validation-readiness
    if: ${{ secrets.UNITY_LICENSE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-EditMode-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-EditMode-
            Library-

      - name: Run EditMode tests
        id: editmode-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: EditMode
          artifactsPath: artifacts/editmode

      - name: Upload EditMode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-artifacts
          path: ${{ steps.editmode-tests.outputs.artifactsPath }}
